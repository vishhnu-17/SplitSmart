<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitSmart {% block title %}{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* ── Light mode defaults ── */
        [data-bs-theme="light"] body {
            background-color: #f4f6f9;
        }
        [data-bs-theme="light"] .navbar {
            background-color: #ffffff !important;
        }
        [data-bs-theme="light"] .card {
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* ── Dark mode overrides ── */
        [data-bs-theme="dark"] body {
            background-color: #0f1117;
        }
        [data-bs-theme="dark"] .navbar {
            background-color: #1a1d27 !important;
            border-bottom: 1px solid #2a2d3a;
        }
        [data-bs-theme="dark"] .card {
            background-color: #1a1d27;
            border: 1px solid #2a2d3a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        [data-bs-theme="dark"] .list-group-item {
            background-color: #1a1d27;
            border-color: #2a2d3a;
        }
        [data-bs-theme="dark"] .table {
            --bs-table-bg: #1a1d27;
            --bs-table-striped-bg: #212433;
            --bs-table-hover-bg: #252839;
        }
        [data-bs-theme="dark"] .card-header {
            background-color: #1a1d27 !important;
            border-bottom: 1px solid #2a2d3a;
        }
        [data-bs-theme="dark"] .table-light {
            --bs-table-bg: #212433;
            color: inherit;
        }
        [data-bs-theme="dark"] .bg-light {
            background-color: #212433 !important;
        }

        /* ── Shared styles ── */
        .navbar-brand {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
        }
        .card {
            border-radius: 12px;
        }
        .card-header {
            border-radius: 12px 12px 0 0 !important;
        }

        /* ── Theme toggle button ── */
        #theme-toggle {
            border: none;
            background: transparent;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        #theme-toggle:hover {
            background-color: rgba(128,128,128,0.15);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">SplitSmart</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        {% if user.is_authenticated %}
            <li class="nav-item">
                <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            </li>
            <li class="nav-item">
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link nav-link">Logout ({{ user.username }})</button>
                </form>
            </li>
        {% else %}
            <li class="nav-item">
                <a class="nav-link" href="{% url 'login' %}">Login</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'register' %}">Register</a>
            </li>
        {% endif %}
        <!-- Dark/Light Mode Toggle -->
        <li class="nav-item ms-2">
            <button id="theme-toggle" title="Toggle dark/light mode">
                <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
            </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Theme persistence via localStorage ──
    const html = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');

    // Load saved theme or default to light
    const savedTheme = localStorage.getItem('splitsmart-theme') || 'light';
    html.setAttribute('data-bs-theme', savedTheme);
    updateIcon(savedTheme);

    toggleBtn.addEventListener('click', () => {
        const current = html.getAttribute('data-bs-theme');
        const next = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-bs-theme', next);
        localStorage.setItem('splitsmart-theme', next);
        updateIcon(next);
    });

    function updateIcon(theme) {
        if (theme === 'dark') {
            icon.className = 'bi bi-sun-fill';
        } else {
            icon.className = 'bi bi-moon-stars-fill';
        }
    }
</script>
</body>
</html>
