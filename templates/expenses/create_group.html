{% extends 'base.html' %}

{% block title %}- Create Group{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Create New Group</h4>
                <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-secondary">Back</a>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted fw-semibold">Group Name</label>
                    {{ form.name }}
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold">Members</label>
                    <small class="d-block text-muted mb-2">Hold down "Control", or "Command" on a Mac, to select more than one.</small>
                    {{ form.members }}
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Create Group</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
