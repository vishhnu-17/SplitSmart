{% extends 'base.html' %}

{% block title %}- Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 mt-5">
            <h3 class="text-center mb-4">Welcome Back</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label text-muted fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label text-muted fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>
                {% if form.errors %}
                    <div class="text-danger small mb-3">
                        Invalid username or password.
                    </div>
                {% endif %}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Log in</button>
                </div>
            </form>
            <p class="text-center mt-3 text-muted">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
